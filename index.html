<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Expedição - Galvânica Danuta</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; color: #333; }
        .container-menu { width: 100%; max-width: 400px; text-align: center; padding: 20px; box-sizing: border-box; }
        
        .logo-menu img { height: 80px; margin-bottom: 10px; }
        
        .titulo-menu { color: #0f4c81; font-size: 28px; font-weight: bold; text-transform: uppercase; margin-bottom: 50px; }
        
        .btn-menu { 
            width: 100%; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: none; 
            border-radius: 15px; 
            font-size: 20px; 
            font-weight: 700; 
            cursor: pointer; 
            display: block; 
            text-decoration: none; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
            text-align: center;
        }
        
        .btn-menu-nf { background: #0f4c81; color: white; }
        .btn-menu-os { background: #2c3e50; color: white; }
        
        .btn-menu:active { transform: scale(0.95); opacity: 0.9; }
    </style>
</head>
<body>

<div class="container-menu">
    <div class="logo-menu">
        <img src="https://raw.githubusercontent.com/galvanicadanuta1-ai/canhoto-digital/main/logo.png">
    </div>
    
    <div class="titulo-menu">Expedição</div>
    
    <a href="tela-nfe.html" class="btn-menu btn-menu-nf">Saída - NFe</a>
    <a href="tela-os.html" class="btn-menu btn-menu-os">Saída OS</a>
</div>

</body>
</html>
