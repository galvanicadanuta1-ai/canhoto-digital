<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.container{
max-width:520px;
margin:auto;
padding:15px;
}

.topo{
text-align:center;
}

.logo{
width:180px;
margin-bottom:5px;
}

.titulo{
font-size:22px;
font-weight:bold;
}

.limparTudo{
position:absolute;
right:15px;
top:15px;
font-size:26px;
color:red;
cursor:pointer;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:18px;
}

.btnCamera{background:#0f4c81;color:white;}
.btnSalvar{background:green;color:white;}
.btnLimpar{background:red;color:white;}

#notas{
background:white;
padding:10px;
margin-top:10px;
border-radius:6px;
font-size:18px;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:6px;
border:1px solid #ccc;
font-size:17px;
}

canvas{
border:2px solid #333;
width:100%;
height:160px;
background:white;
touch-action:none;
}
</style>
</head>

<body>

<div class="limparTudo" onclick="limparTudo()">✖</div>

<div class="container">

<div class="topo">
<img class="logo" src="COLE_AQUI_O_LINK_RAW_DO_SEU_LOGO">
<div class="titulo">Canhoto Digital Danuta</div>
</div>

<button class="btnCamera" onclick="abrirScanner()">Abrir Scanner</button>
<button class="btnCamera" onclick="notaManual()">Adicionar NF manual</button>

<div id="notas">Nenhuma nota adicionada</div>

<input id="recebedor" placeholder="Recebedor">
<input id="rgcpf" placeholder="RG ou CPF" inputmode="numeric">

<p><b>Assinatura</b></p>
<canvas id="assinatura"></canvas>

<button class="btnLimpar" onclick="limparAss()">Limpar assinatura</button>

<input id="ordem" placeholder="Ordem de Serviço" inputmode="numeric">
<input id="expedidor" placeholder="Expedidor">

<button class="btnSalvar" onclick="salvar()">Salvar</button>

</div>

<script>

let notas=[]

function atualizarLista(){
document.getElementById("notas").innerHTML =
"<b>Notas:</b><br>"+notas.join("<br>")
}

function notaManual(){
let nota=prompt("Digite número da nota")
if(nota){
nota = nota.replace(/\D/g,'')
if(nota){
notas.push(nota)
atualizarLista()
}
}
}

function limparTudo(){
location.reload()
}

// ASSINATURA
let canvas=document.getElementById("assinatura")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-40
canvas.height=160

let desenhando=false

canvas.addEventListener("pointerdown",()=>{desenhando=true;ctx.beginPath()})
canvas.addEventListener("pointermove",(e)=>{
if(!desenhando)return
let r=canvas.getBoundingClientRect()
ctx.lineWidth=2
ctx.lineTo(e.clientX-r.left,e.clientY-r.top)
ctx.stroke()
})
canvas.addEventListener("pointerup",()=>desenhando=false)

function limparAss(){
ctx.clearRect(0,0,canvas.width,canvas.height)
}

function salvar(){

let recebedor=document.getElementById("recebedor").value.trim()
let rgcpf=document.getElementById("rgcpf").value.replace(/\D/g,'')
let ordem=document.getElementById("ordem").value.replace(/\D/g,'')
let expedidor=document.getElementById("expedidor").value.trim()

if(!recebedor || !rgcpf || !ordem || !expedidor){
alert("Preencha todos os campos obrigatórios")
return
}

if(notas.length==0){
alert("Nenhuma nota adicionada")
return
}

let assinatura=canvas.toDataURL()

if(assinatura.length < 5000){
alert("Assinatura obrigatória")
return
}

fetch("SEU_LINK_GS_AQUI",{
method:"POST",
mode:"no-cors",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
notas:notas,
recebedor:recebedor,
documento:rgcpf,
ordem:ordem,
expedidor:expedidor,
assinatura:assinatura
})
})

alert("Salvo com sucesso!")
location.reload()

}

</script>

</body>
</html>
