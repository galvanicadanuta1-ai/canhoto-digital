<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Arial; margin: 0; background: #f0f2f5; padding-bottom: 40px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .topo { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .logo-topo { height: 35px; }
        #scannerTela { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 9999; }
        #reader { width: 100% !important; height: 100% !important; }
        button { width: 100%; padding: 16px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btnScan { background: #0f4c81; color: white; }
        .btnSalvar { background: #2ecc71; color: white; margin-top: 30px; }
        .btnManual { padding: 10px; font-size: 13px; background: #555; color: #fff; margin-top: 5px; width: auto; border-radius: 6px; }
        .box-leitura { background: #fff; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; min-height: 45px; }
        .tag { background: #0f4c81; color: #fff; padding: 6px 10px; margin: 3px; border-radius: 5px; display: inline-block; font-size: 12px; }
        input { width: 100%; padding: 16px; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        canvas { border: 2px solid #bdc3c7; width: 100%; height: 180px; background: white; touch-action: none; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="topo">
        <img src="https://raw.githubusercontent.com/galvanicadanuta1-ai/canhoto-digital/main/logo.png" class="logo-topo">
        <div onclick="location.reload()" style="color:red; font-size:12px; font-weight:bold; cursor:pointer;">RESET</div>
    </div>

    <button class="btnScan" onclick="abrirScanner('NF')">📷 ESCANEAR NOTA FISCAL</button>
    <div class="box-leitura" id="contNF"></div>
    <button class="btnManual" onclick="addManual('NF')">+ Digitar Nota</button>

    <input id="recebedor" type="text" placeholder="Nome Completo de quem recebeu" oninput="this.value=this.value.replace(/[0-9]/g,'')">
    <input id="rgcpf" type="tel" inputmode="numeric" placeholder="Documento (RG ou CPF)" oninput="this.value=this.value.replace(/\D/g,'')">
    
    <canvas id="assinatura"></canvas>
    <button style="background:none; color:red; text-decoration:underline; font-size:12px; width:auto; padding:0;" onclick="limparAss()">Limpar Assinatura</button>

    <button class="btnScan" style="margin-top:20px;" onclick="abrirScanner('OS')">📷 ESCANEAR OS</button>
    <div class="box-leitura" id="contOS"></div>
    <button class="btnManual" onclick="addManual('OS')">+ Digitar OS</button>

    <input id="expedidor" type="text" placeholder="Nome do Expedidor" oninput="this.value=this.value.replace(/[0-9]/g,'')">

    <button class="btnSalvar" id="btnSalvar" onclick="salvar()">SALVAR</button>
</div>

<div id="scannerTela">
    <div id="reader"></div>
    <div style="position:absolute; bottom:30px; width:100%; text-align:center;">
        <button onclick="fecharScanner()" style="width:80%; background:red; color:white;">CANCELAR</button>
    </div>
</div>

<script>
let scanner;
let listaNF = [];
let listaOS = [];
let destino = 'NF';
const apiUrl = "SUA_URL_ATUAL_AQUI"; // Mantenha a URL que você já usa

function extrairNum(codigo) {
    let n = codigo.replace(/\D/g, '');
    return n.length >= 34 ? n.substring(25, 34) : n;
}

function abrirScanner(tipo) {
    destino = tipo;
    document.getElementById("scannerTela").style.display = "block";
    scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 60, qrbox: { width: 280, height: 150 } }, (codigo) => {
        let num = extrairNum(codigo);
        adicionarValor(num);
        fecharScanner();
    }).catch(err => alert("Câmera indisponível."));
}

function fecharScanner() {
    if (scanner) { scanner.stop().then(() => { document.getElementById("scannerTela").style.display = "none"; }); }
}

function addManual(tipo) {
    destino = tipo;
    let n = prompt("Digite o número:");
    if (n) { adicionarValor(n.replace(/\D/g, '')); }
}

function adicionarValor(val) {
    if (!val) return;
    if (destino === 'NF') {
        if (!listaNF.includes(val)) listaNF.push(val);
        renderTags('contNF', listaNF);
    } else {
        if (!listaOS.includes(val)) listaOS.push(val);
        renderTags('contOS', listaOS);
    }
}

function renderTags(id, lista) {
    document.getElementById(id).innerHTML = lista.map(item => `<span class="tag">${item}</span>`).join('');
}

const canvas = document.getElementById("assinatura");
const ctx = canvas.getContext("2d");
canvas.width = canvas.offsetWidth; canvas.height = 180;
let drawing = false;
canvas.addEventListener("pointerdown", (e) => { drawing = true; ctx.beginPath(); const r = canvas.getBoundingClientRect(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top); });
canvas.addEventListener("pointermove", (e) => { if (!drawing) return; const r = canvas.getBoundingClientRect(); ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke(); });
canvas.addEventListener("pointerup", () => drawing = false);
function limparAss() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

function salvar() {
    const btn = document.getElementById("btnSalvar");
    btn.disabled = true; btn.innerText = "ENVIANDO...";

    fetch(apiUrl, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
            notas: listaNF,
            ordens: listaOS,
            recebedor: document.getElementById("recebedor").value,
            documento: document.getElementById("rgcpf").value,
            expedidor: document.getElementById("expedidor").value,
            assinatura: canvas.toDataURL("image/png")
        })
    }).then(() => {
        alert("Sucesso!");
        location.reload();
    }).catch(() => {
        alert("Erro.");
        btn.disabled = false;
        btn.innerText = "SALVAR";
    });
}
</script>
</body>
</html>
