<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
padding:12px;
}

.container{
max-width:500px;
margin:auto;
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
max-width:200px;
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:8px;
background:#0f4c81;
color:white;
margin-top:8px;
}

input{
width:100%;
padding:14px;
font-size:18px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
}

#reader{
width:100%;
margin-top:10px;
}

#notas{
background:white;
padding:10px;
margin-top:10px;
font-size:18px;
border-radius:6px;
}

canvas{
border:2px solid #333;
width:100%;
height:160px;
background:white;
touch-action:none;
}

</style>

</head>

<body>

<div class="container">

<div class="logo">
<img src="https://drive.google.com/uc?export=view&id=1vKNP9rNp9fDg58y0RkZWIyi_h_xj1f_m">
</div>

<button onclick="abrirCamera()">Abrir câmera</button>
<button onclick="fecharCamera()">Fechar câmera</button>

<button onclick="notaManual()">Adicionar NFe manual</button>

<div id="reader"></div>

<div id="notas"></div>

<input id="empresa" placeholder="Empresa Destinatária">

<input id="cnpj" placeholder="CNPJ Destinatário">

<input id="recebedor" placeholder="Recebedor (obrigatório)">

<input id="rgcpf" placeholder="RG ou CPF (obrigatório)">

<p>Assinatura</p>

<canvas id="assinatura"></canvas>

<input id="ordem" placeholder="Nº da Ordem de Serviço (obrigatório)">

<input id="expedidor" placeholder="Expedidor (obrigatório)">

<button onclick="limpar()">Limpar assinatura</button>

<button onclick="salvar()">Salvar</button>

</div>

<script>

let scanner
let notas=[]

async function buscarDestinatario(chave){

try{

let url="https://brasilapi.com.br/api/nfe/v1/"+chave

let r = await fetch(url)

let j = await r.json()

document.getElementById("empresa").value = j.destinatario.razao_social

document.getElementById("cnpj").value = j.destinatario.cnpj

}catch{

console.log("NF não encontrada")

}

}

function extrairNota(codigo){

let chave = codigo.substring(0,44)

buscarDestinatario(chave)

return codigo.substring(25,34)

}

function abrirCamera(){

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode:"environment"},
{ fps:15, qrbox:280 },

(codigo)=>{

let nota = extrairNota(codigo)

if(!notas.includes(nota)){

notas.push(nota)

document.getElementById("notas").innerHTML=notas.join("<br>")

navigator.vibrate(200)

let beep=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")
beep.play()

}

}

)

}

function fecharCamera(){

if(scanner){
scanner.stop()
}

}

function notaManual(){

let nota=prompt("Digite número da nota")

if(nota){

notas.push(nota)

document.getElementById("notas").innerHTML=notas.join("<br>")

}

}

let canvas=document.getElementById("assinatura")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-40
canvas.height=160

let desenhando=false

canvas.addEventListener("pointerdown",()=>{desenhando=true;ctx.beginPath()})

canvas.addEventListener("pointermove",(e)=>{

if(!desenhando)return

let r=canvas.getBoundingClientRect()

ctx.lineWidth=2
ctx.lineTo(e.clientX-r.left,e.clientY-r.top)
ctx.stroke()

})

canvas.addEventListener("pointerup",()=>desenhando=false)

function limpar(){
ctx.clearRect(0,0,canvas.width,canvas.height)
}

function salvar(){

let recebedor=document.getElementById("recebedor").value
let rgcpf=document.getElementById("rgcpf").value
let expedidor=document.getElementById("expedidor").value
let ordem=document.getElementById("ordem").value

if(recebedor==""||rgcpf==""||expedidor==""||ordem==""){

alert("Preencha todos os campos obrigatórios")
return

}

if(notas.length==0){

alert("Nenhuma nota foi adicionada")
return

}

let assinatura=canvas.toDataURL()

fetch("https://script.google.com/macros/s/AKfycbyom4lgFJTQXijV4MTRwgIZOWa0pksXUSi0XSKBN3yciuQF0LfARKY8IiKq0_7BHXB5wg/exec",{

method:"POST",

body:JSON.stringify({

notas:notas,
empresa:empresa.value,
cnpj:cnpj.value,
recebedor:recebedor,
documento:rgcpf,
expedidor:expedidor,
ordem:ordem,
assinatura:assinatura

})

})

alert("Salvo com sucesso!")

location.reload()

}

</script>

</body>
</html>
