<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
overflow:hidden;
}

.container{
max-width:480px;
margin:auto;
padding:8px;
height:100vh;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.topo{
text-align:center;
position:relative;
}

.logo{
height:40px;
}

.titulo{
font-size:18px;
font-weight:bold;
margin-top:5px;
}

.limpar{
position:absolute;
right:5px;
top:0;
font-size:26px;
color:red;
cursor:pointer;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
font-size:16px;
}

.btnCamera{
background:#0f4c81;
color:white;
}

.btnSalvar{
background:green;
color:white;
}

.btnLimpar{
background:red;
color:white;
}

#notas{
background:white;
padding:6px;
border-radius:6px;
font-size:14px;
min-height:40px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

canvas{
border:2px solid #333;
width:100%;
height:110px;
background:white;
touch-action:none;
}

#scannerTela{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
z-index:9999;
}

#reader{
width:100%;
height:100%;
}

.scanline{
position:absolute;
top:50%;
left:0;
width:100%;
height:2px;
background:#00ff00;
}

.btnFechar{
position:absolute;
top:15px;
right:15px;
background:red;
color:white;
padding:10px;
border-radius:6px;
z-index:10000;
}

</style>

</head>

<body>

<div class="container">

<div>

<div class="topo">

<img src="logo.png" class="logo">

<div class="titulo">Canhoto Digital Danuta</div>

<div class="limpar" onclick="limparTudo()">✖</div>

</div>

<button class="btnCamera" onclick="abrirScanner()">Abrir Scanner</button>

<button class="btnCamera" onclick="notaManual()">NF Manual</button>

<div id="notas"></div>

<input id="recebedor" placeholder="Recebedor">

<input id="rgcpf" placeholder="RG ou CPF">

<p style="margin:5px 0;">Assinatura</p>

<canvas id="assinatura"></canvas>

<button class="btnLimpar" onclick="limparAss()">Limpar assinatura</button>

<input id="ordem" placeholder="Ordem de Serviço">

<input id="expedidor" placeholder="Expedidor">

</div>

<button class="btnSalvar" onclick="salvar()">Salvar</button>

</div>


<div id="scannerTela">

<div class="btnFechar" onclick="fecharScanner()">FECHAR</div>

<div id="reader"></div>

<div class="scanline"></div>

</div>

<script>

let scanner
let notas=[]

function extrairNumeroNF(codigo){

let numeros=codigo.replace(/\D/g,'')

if(numeros.length>=34){
return numeros.substring(25,34)
}

return numeros

}

function abrirScanner(){

document.getElementById("scannerTela").style.display="block"

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: "environment" },
{
fps:30,
qrbox:300
},
(codigo)=>{

let nota=extrairNumeroNF(codigo)

if(!notas.includes(nota)){

notas.push(nota)

document.getElementById("notas").innerHTML=notas.join("<br>")

navigator.vibrate(200)

let beep=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")
beep.play()

}

}
)

}

function fecharScanner(){

if(scanner){
scanner.stop()
}

document.getElementById("scannerTela").style.display="none"

}

function notaManual(){

let nota=prompt("Digite número da nota")

if(nota){

notas.push(nota)

document.getElementById("notas").innerHTML=notas.join("<br>")

}

}

function limparTudo(){
location.reload()
}

let canvas=document.getElementById("assinatura")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-20
canvas.height=110

let desenhando=false

canvas.addEventListener("pointerdown",()=>{

desenhando=true
ctx.beginPath()

})

canvas.addEventListener("pointermove",(e)=>{

if(!desenhando)return

let r=canvas.getBoundingClientRect()

ctx.lineWidth=2
ctx.lineTo(e.clientX-r.left,e.clientY-r.top)
ctx.stroke()

})

canvas.addEventListener("pointerup",()=>desenhando=false)

function limparAss(){
ctx.clearRect(0,0,canvas.width,canvas.height)
}

function salvar(){

let recebedor=document.getElementById("recebedor").value
let rgcpf=document.getElementById("rgcpf").value
let ordem=document.getElementById("ordem").value
let expedidor=document.getElementById("expedidor").value

if(recebedor==""||rgcpf==""||ordem==""||expedidor==""){
alert("Preencha todos os campos obrigatórios")
return
}

if(notas.length==0){
alert("Nenhuma nota adicionada")
return
}

let assinatura=canvas.toDataURL()

fetch("https://script.google.com/macros/s/AKfycbyom4lgFJTQXijV4MTRwgIZOWa0pksXUSi0XSKBN3yciuQF0LfARKY8IiKq0_7BHXB5wg/exec",{

method:"POST",
mode:"no-cors",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

notas:notas,
recebedor:recebedor,
documento:rgcpf,
ordem:ordem,
expedidor:expedidor,
assinatura:assinatura

})

})
.then(()=>{

alert("Salvo com sucesso!")

location.reload()

})

}

</script>

</body>
</html>
