<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#f0f2f5;
margin:0;
padding:10px;
}

.container{
max-width:520px;
margin:auto;
}

.top{
display:flex;
align-items:center;
justify-content:space-between;
}

.logo img{
height:50px;
}

.limpar{
font-size:26px;
color:red;
cursor:pointer;
}

button{
width:100%;
padding:15px;
margin-top:8px;
border:none;
border-radius:8px;
font-size:18px;
}

.camera{
background:#0f4c81;
color:white;
}

.salvar{
background:green;
color:white;
}

.limparAss{
background:red;
color:white;
}

#scannerTela{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:9999;
display:none;
}

#reader{
width:100%;
height:100%;
position:relative;
}

.scan-line{
position:absolute;
top:50%;
left:0;
width:100%;
height:3px;
background:red;
}

.fecharScanner{
position:absolute;
top:20px;
right:20px;
background:red;
color:white;
padding:10px 14px;
border-radius:6px;
font-size:18px;
z-index:10000;
}

#notas{
background:white;
padding:10px;
margin-top:10px;
border-radius:6px;
font-size:18px;
}

input{
width:100%;
padding:12px;
margin-top:6px;
border-radius:6px;
border:1px solid #ccc;
font-size:17px;
}

canvas{
border:2px solid #333;
width:100%;
height:160px;
background:white;
touch-action:none;
}

</style>

</head>

<body>

<div class="container">

<div class="top">

<div class="limpar" onclick="limparTudo()">✖</div>

<div class="logo">
<img src="https://drive.google.com/uc?export=view&id=1vKNP9rNp9fDg58y0RkZWIyi_h_xj1f_m">
</div>

</div>

<button class="camera" onclick="abrirScanner()">Abrir Scanner</button>

<button class="camera" onclick="notaManual()">Adicionar NF manual</button>

<div id="notas"></div>

<input id="recebedor" placeholder="Recebedor">

<input id="rgcpf" placeholder="RG ou CPF">

<p>Assinatura</p>

<canvas id="assinatura"></canvas>

<input id="ordem" placeholder="Ordem de Serviço">

<input id="expedidor" placeholder="Expedidor">

<button class="limparAss" onclick="limpar()">Limpar assinatura</button>

<button class="salvar" onclick="salvar()">Salvar</button>

</div>


<div id="scannerTela">

<div class="fecharScanner" onclick="fecharScanner()">FECHAR</div>

<div id="reader">
<div class="scan-line"></div>
</div>

</div>

<script>

let scanner
let notas=[]

function extrairNumeroNF(codigo){

let numeros=codigo.replace(/\D/g,'')

if(numeros.length>=34){

return numeros.substring(25,34)

}

return numeros

}

function abrirScanner(){

document.getElementById("scannerTela").style.display="block"

scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: { exact: "environment" } },

{
fps:30,
qrbox:400
},

(codigo)=>{

let nota = extrairNumeroNF(codigo)

if(!notas.includes(nota)){

notas.push(nota)

document.getElementById("notas").innerHTML="Notas lidas:<br>"+notas.join("<br>")

navigator.vibrate(200)

let beep=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")
beep.play()

}

}

)

}

function fecharScanner(){

if(scanner){

scanner.stop()

}

document.getElementById("scannerTela").style.display="none"

}

function notaManual(){

let nota=prompt("Digite número da nota")

if(nota){

notas.push(nota)

document.getElementById("notas").innerHTML=notas.join("<br>")

}

}

function limparTudo(){

location.reload()

}

let canvas=document.getElementById("assinatura")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-40
canvas.height=160

let desenhando=false

canvas.addEventListener("pointerdown",()=>{

desenhando=true
ctx.beginPath()

})

canvas.addEventListener("pointermove",(e)=>{

if(!desenhando)return

let r=canvas.getBoundingClientRect()

ctx.lineWidth=2
ctx.lineTo(e.clientX-r.left,e.clientY-r.top)
ctx.stroke()

})

canvas.addEventListener("pointerup",()=>desenhando=false)

function limpar(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}

function salvar(){

let recebedor=document.getElementById("recebedor").value
let rgcpf=document.getElementById("rgcpf").value
let ordem=document.getElementById("ordem").value
let expedidor=document.getElementById("expedidor").value

if(recebedor==""||rgcpf==""||ordem==""||expedidor==""){

alert("Preencha todos os campos obrigatórios")
return

}

if(notas.length==0){

alert("Nenhuma nota adicionada")
return

}

let assinatura=canvas.toDataURL()

fetch("https://script.google.com/macros/s/AKfycbyom4lgFJTQXijV4MTRwgIZOWa0pksXUSi0XSKBN3yciuQF0LfARKY8IiKq0_7BHXB5wg/exec",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

notas:notas,
recebedor:recebedor,
documento:rgcpf,
ordem:ordem,
expedidor:expedidor,
assinatura:assinatura

})

})
.then(response=>response.text())
.then(data=>{

alert("Salvo com sucesso!")

location.reload()

})

}

</script>

</body>
</html>
