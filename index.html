<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Arial; margin: 0; background: #f0f2f5; color: #333; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .topo { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .logo-topo { height: 35px; }
        .titulo { font-size: 16px; font-weight: bold; color: #0f4c81; }
        
        #scannerTela { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 9999; }
        #reader { width: 100% !important; height: 100% !important; }
        #reader video { object-fit: cover !important; }
        
        button { width: 100%; padding: 16px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btnCamera { background: #0f4c81; color: white; }
        .btnSalvar { background: #2ecc71; color: white; margin-top: 25px; }
        .btnManual { padding: 8px; font-size: 14px; background: #ced4da; color: #000; margin-top: 8px; border: 1px solid #adb5bd; }
        
        #listaNotas { background: #fff; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .nota-item { background: #d1d8e0; color: #2d3436; padding: 6px 12px; margin: 4px; border-radius: 6px; display: inline-block; font-size: 13px; font-weight: bold; }
        
        input { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        canvas { border: 2px solid #bdc3c7; width: 100%; height: 180px; background: white; touch-action: none; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="topo">
        <img src="logo.png" class="logo-topo" onerror="this.src='https://drive.google.com/uc?export=view&id=18XS6nKJjY2yAJazHg_Iju67e17Bvr0hn'">
        <div class="titulo">CANHOTO DIGITAL</div>
        <div onclick="location.reload()" style="color:red; font-size:12px; font-weight:bold; cursor:pointer">LIMPAR TUDO</div>
    </div>

    <button class="btnCamera" onclick="abrirScanner()">📷 LER CÓDIGO DE BARRAS</button>
    
    <div id="listaNotas">
        <small style="color:#7f8c8d;">Notas na fila:</small>
        <div id="notasContiner"></div>
        <button class="btnManual" onclick="notaManual()">+ Digitar Nota Manualmente</button>
    </div>

    <input id="recebedor" type="text" placeholder="Nome de quem recebeu (Somente Texto)" oninput="this.value=this.value.replace(/[0-9]/g,'')">
    <input id="rgcpf" type="tel" inputmode="numeric" placeholder="Documento RG/CPF (Somente Números)" oninput="this.value=this.value.replace(/\D/g,'')">
    
    <p style="margin: 20px 0 5px 0; font-size: 14px;"><b>Assine abaixo:</b></p>
    <canvas id="assinatura"></canvas>
    <button style="background:none; color:red; text-decoration:underline; font-size:12px; width:auto; padding:0;" onclick="limparAss()">Limpar Assinatura</button>

    <input id="ordem" type="tel" inputmode="numeric" placeholder="Ordem de Serviço (Obrigatório - Números)" oninput="this.value=this.value.replace(/\D/g,'')">
    <input id="expedidor" type="text" placeholder="Nome do Expedidor (Somente Texto)" oninput="this.value=this.value.replace(/[0-9]/g,'')">

    <button class="btnSalvar" id="btnSalvar" onclick="salvar()">FINALIZAR E ENVIAR</button>
</div>

<div id="scannerTela">
    <div id="reader"></div>
    <div style="position:absolute; bottom:30px; width:100%; text-align:center;">
        <button onclick="fecharScanner()" style="width:80%; background:red; color:white;">CANCELAR LEITURA</button>
    </div>
</div>

<script>
let scanner;
let notas = [];
const apiUrl = "https://script.google.com/macros/s/AKfycbxOseaVN67HO0UMyGpHoWqCX1llA0uazVeI4xvUha7TYF7UNL-Jnwc-LIWBfmmzce9LlA/exec";

function extrairNumeroNF(codigo) {
    let numeros = codigo.replace(/\D/g, '');
    return numeros.length >= 34 ? numeros.substring(25, 34) : numeros;
}

function abrirScanner() {
    document.getElementById("scannerTela").style.display = "block";
    scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 60, qrbox: { width: 320, height: 150 } }, (codigo) => {
        let nota = extrairNumeroNF(codigo);
        if (!notas.includes(nota)) {
            notas.push(nota);
            document.getElementById("notasContiner").innerHTML = notas.map(n => `<span class="nota-item">${n}</span>`).join('');
            fecharScanner();
        }
    }).catch(err => alert("Erro câmera: " + err));
}

function fecharScanner() {
    if (scanner) { scanner.stop().then(() => { document.getElementById("scannerTela").style.display = "none"; }); }
}

function notaManual() {
    let n = prompt("Número da Nota (Somente números):");
    if (n) {
        let limpo = n.replace(/\D/g, '');
        if (limpo && !notas.includes(limpo)) {
            notas.push(limpo);
            document.getElementById("notasContiner").innerHTML = notas.map(n => `<span class="nota-item">${n}</span>`).join('');
        }
    }
}

const canvas = document.getElementById("assinatura");
const ctx = canvas.getContext("2d");
canvas.width = canvas.offsetWidth;
canvas.height = 180;
let drawing = false;

canvas.addEventListener("pointerdown", (e) => { drawing = true; ctx.beginPath(); const r = canvas.getBoundingClientRect(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top); });
canvas.addEventListener("pointermove", (e) => { if (!drawing) return; const r = canvas.getBoundingClientRect(); ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke(); });
canvas.addEventListener("pointerup", () => drawing = false);
function limparAss() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

function salvar() {
    const fields = {
        recebedor: document.getElementById("recebedor").value,
        doc: document.getElementById("rgcpf").value,
        ordem: document.getElementById("ordem").value,
        exp: document.getElementById("expedidor").value
    };

    if (!fields.recebedor || !fields.doc || !fields.ordem || !fields.exp || notas.length === 0) {
        alert("Atenção: Todos os campos são obrigatórios (incluindo Ordem de Serviço e pelo menos uma nota).");
        return;
    }

    const btn = document.getElementById("btnSalvar");
    btn.disabled = true; btn.innerText = "ENVIANDO...";

    fetch(apiUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            notas: notas,
            recebedor: fields.recebedor,
            documento: fields.doc,
            ordem: fields.ordem,
            expedidor: fields.exp,
            assinatura: canvas.toDataURL("image/png")
        })
    }).then(() => {
        alert("Finalizado com sucesso!");
        location.reload();
    }).catch(() => {
        alert("Erro de conexão.");
        btn.disabled = false;
    });
}
</script>
</body>
</html>
