<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <title>Canhoto Digital - Galvânica Danuta</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Arial; margin: 0; background: #f0f2f5; padding-bottom: 30px; touch-action: manipulation; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .topo { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .logo-topo { height: 35px; }
        #scannerTela { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; z-index: 9999; }
        #reader { width: 100% !important; height: 100% !important; }
        .linha-guia { position: absolute; top: 50%; left: 50%; width: 85%; height: 2px; background: red; transform: translate(-50%, -50%); z-index: 10000; pointer-events: none; }
        button { width: 100%; padding: 16px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btnCamera { background: #0f4c81; color: white; }
        .btnSalvar { background: #2ecc71; color: white; margin-top: 25px; }
        .btnManual { padding: 10px; font-size: 13px; background: #444; color: #fff; margin-top: 5px; width: auto; display: block; }
        .badge-container { background: #fff; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; min-height: 40px; }
        .badge-item { background: #0f4c81; color: #fff; padding: 5px 10px; margin: 3px; border-radius: 4px; display: inline-block; font-size: 12px; font-weight: bold; }
        input { width: 100%; padding: 16px; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        canvas { border: 2px solid #0f4c81; width: 100%; height: 200px; background: white; touch-action: none; border-radius: 10px; margin-top: 15px; }
        .input-wrapper { position: relative; margin-top: 15px; }
        .icon-cam-inline { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 24px; cursor: pointer; width: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="topo">
        <img src="https://raw.githubusercontent.com/galvanicadanuta1-ai/canhoto-digital/main/logo.png" class="logo-topo">
        <div onclick="location.reload(true)" style="color:red; font-size:12px; font-weight:bold;">RESET</div>
    </div>

    <button class="btnCamera" onclick="abrirScanner('NF')">📷 SCANNER NOTA FISCAL</button>
    <div class="badge-container" id="contNF"></div>
    <button class="btnManual" onclick="addManual('NF')">+ Digitar Nota</button>

    <input id="recebedor" type="text" placeholder="Nome Completo de quem recebeu">
    <input id="rgcpf" type="tel" placeholder="Documento (RG ou CPF)">
    
    <canvas id="assinatura"></canvas>
    <button style="background:none; color:red; text-decoration:underline; font-size:12px; width:auto; padding:0;" onclick="limparAss()">Limpar Assinatura</button>

    <div class="input-wrapper">
        <input id="ordem_display" type="text" placeholder="Ordem de Serviço Danuta" readonly>
        <button class="icon-cam-inline" onclick="abrirScanner('OS')">📷</button>
    </div>
    <div class="badge-container" id="contOS"></div>
    <button class="btnManual" onclick="addManual('OS')">+ Digitar OS</button>

    <input id="expedidor" type="text" placeholder="Nome do Expedidor">
    <button class="btnSalvar" id="btnSalvar" onclick="salvar()">SALVAR CANHOTO</button>
</div>

<div id="scannerTela">
    <div id="reader"></div>
    <div class="linha-guia"></div>
    <div style="position:absolute; bottom:30px; width:100%; text-align:center;">
        <button onclick="fecharScanner()" style="width:80%; background:red; color:white;">CANCELAR</button>
    </div>
</div>

<script>
let scanner;
let listaNF = [];
let listaOS = [];
let destino = 'NF';
let jaAssinou = false; // Validador de assinatura

const apiUrl = "https://script.google.com/macros/s/AKfycbxOseaVN67HO0UMyGpHoWqCX1llA0uazVeI4xvUha7TYF7UNL-Jnwc-LIWBfmmzce9LlA/exec";

function abrirScanner(tipo) {
    destino = tipo;
    document.getElementById("scannerTela").style.display = "block";
    scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 30, qrbox: { width: 280, height: 150 } }, (codigo) => {
        let n = codigo.replace(/\D/g, '');
        let num = n.length >= 34 ? n.substring(25, 34) : n;
        adicionarValor(num);
        fecharScanner();
    }).catch(err => alert("Erro câmera."));
}

function fecharScanner() {
    if (scanner) { scanner.stop().then(() => { document.getElementById("scannerTela").style.display = "none"; }); }
}

function adicionarValor(val) {
    if (!val) return;
    if (destino === 'NF') {
        if (!listaNF.includes(val)) listaNF.push(val);
        document.getElementById('contNF').innerHTML = listaNF.map(i => `<span class="badge-item">${i}</span>`).join('');
    } else {
        if (!listaOS.includes(val)) listaOS.push(val);
        document.getElementById('contOS').innerHTML = listaOS.map(i => `<span class="badge-item">${i}</span>`).join('');
        document.getElementById("ordem_display").value = listaOS.length + " OS Adicionada(s)";
    }
}

function addManual(tipo) {
    destino = tipo;
    let n = prompt("Digite o número:");
    if (n) { adicionarValor(n.replace(/\D/g, '')); }
}

// Lógica de Assinatura Reforçada
const canvas = document.getElementById("assinatura");
const ctx = canvas.getContext("2d");
canvas.width = canvas.offsetWidth;
canvas.height = 200;

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
}

function start(e) { 
    e.preventDefault(); 
    drawing = true; 
    jaAssinou = true; // Libera a validação
    ctx.beginPath(); 
    const p = getPos(e); 
    ctx.moveTo(p.x, p.y); 
}

function move(e) { 
    if (!drawing) return; 
    e.preventDefault(); 
    const p = getPos(e); 
    ctx.lineTo(p.x, p.y); 
    ctx.lineWidth = 3; 
    ctx.lineCap = "round"; 
    ctx.stroke(); 
}

let drawing = false;
canvas.addEventListener("mousedown", start);
canvas.addEventListener("mousemove", move);
window.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("touchstart", start, {passive: false});
canvas.addEventListener("touchmove", move, {passive: false});
canvas.addEventListener("touchend", () => drawing = false);

function limparAss() { ctx.clearRect(0, 0, canvas.width, canvas.height); jaAssinou = false; }

function salvar() {
    const r = document.getElementById("recebedor").value.trim();
    const d = document.getElementById("rgcpf").value.trim();
    const x = document.getElementById("expedidor").value.trim();

    // VALIDAÇÃO EXPLICÍTA
    if (!r || !d || !x || listaNF.length === 0 || listaOS.length === 0 || !jaAssinou) {
        alert("Faltam informações!\n\n1. Verifique se escaneou a NF e a OS.\n2. Verifique se assinou o quadro.\n3. Preencha todos os nomes.");
        return;
    }

    const btn = document.getElementById("btnSalvar");
    btn.disabled = true; btn.innerText = "ENVIANDO...";

    fetch(apiUrl, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
            notas: listaNF,
            ordens: listaOS,
            recebedor: r,
            documento: d,
            expedidor: x,
            assinatura: canvas.toDataURL("image/png")
        })
    }).then(() => {
        alert("ENVIADO COM SUCESSO!");
        location.reload(true);
    }).catch(() => {
        alert("Erro ao enviar.");
        btn.disabled = false; btn.innerText = "SALVAR CANHOTO";
    });
}
</script>
</body>
</html>
