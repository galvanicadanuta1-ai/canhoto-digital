<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scanner de Notas</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin:0;
}

#reader{
width:100%;
max-width:500px;
margin:auto;
}

#mira{
position:absolute;
left:50%;
top:50%;
width:220px;
height:3px;
background:#00ff88;
transform:translate(-50%,-50%);
}

#lista{
margin-top:20px;
background:#1e293b;
padding:15px;
border-radius:10px;
}

.nota{
padding:8px;
margin:5px;
background:#334155;
border-radius:6px;
}

button{
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
margin-top:10px;
}

</style>

</head>

<body>

<h2>📦 Scanner de DANFE</h2>

<div style="position:relative">

<div id="reader"></div>
<div id="mira"></div>

</div>

<button onclick="iniciar()">Abrir Câmera</button>

<div id="lista">
<h3>Notas escaneadas</h3>
<div id="notas"></div>
</div>

<audio id="beep">
<source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg">
</audio>

<script>

let notas=[];

function iniciar(){

const scanner=new Html5Qrcode("reader");

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},

(codigo)=>{

if(!notas.includes(codigo)){

notas.push(codigo);

document.getElementById("beep").play();

if(navigator.vibrate){
navigator.vibrate(200);
}

mostrarNotas();

}

}

);

}

function mostrarNotas(){

let html="";

notas.forEach((n,i)=>{

html+=`
<div class="nota">
Nota: ${n}
<button onclick="remover(${i})">❌</button>
</div>
`;

});

document.getElementById("notas").innerHTML=html;

}

function remover(i){

notas.splice(i,1);
mostrarNotas();

}

</script>

</body>
</html>
