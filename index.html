<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Arial; margin: 0; background: #f0f2f5; color: #333; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        
        /* Topo */
        .topo { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .logo-topo { height: 35px; }
        .titulo { font-size: 16px; font-weight: bold; color: #0f4c81; }
        
        /* Scanner FullScreen */
        #scannerTela { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 9999; }
        #reader { width: 100% !important; height: 100% !important; }
        #reader video { object-fit: cover !important; }
        
        .controles-scanner { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 10001; }
        .btn-circular { background: rgba(255,255,255,0.2); color: white; border: 2px solid white; border-radius: 50%; width: 60px; height: 60px; font-size: 12px; cursor: pointer; }

        /* Estilos Gerais */
        button { width: 100%; padding: 16px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .btnCamera { background: #0f4c81; color: white; }
        .btnSalvar { background: #2ecc71; color: white; margin-top: 25px; box-shadow: 0 4px 10px rgba(46,204,113,0.3); }
        .btnLimpar { background: transparent; color: #e74c3c; font-size: 14px; padding: 5px; width: auto; text-decoration: underline; margin-bottom: 10px;}

        #listaNotas { background: #fff; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .nota-item { background: #d1d8e0; color: #2d3436; padding: 6px 12px; margin: 4px; border-radius: 6px; display: inline-block; font-size: 13px; font-weight: bold; }
        
        input { width: 100%; padding: 14px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; background: white; }
        canvas { border: 2px solid #bdc3c7; width: 100%; height: 180px; background: white; touch-action: none; border-radius: 10px; margin-top: 5px; }
        
        .scan-region-highlight { border: 2px solid #00ff00 !important; box-shadow: 0 0 0 4000px rgba(0,0,0,0.5) !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="topo">
        <img src="logo.png" class="logo-topo" onerror="this.src='https://drive.google.com/uc?export=view&id=18XS6nKJjY2yAJazHg_Iju67e17Bvr0hn'">
        <div class="titulo">CANHOTO DIGITAL</div>
        <div onclick="location.reload()" style="color:red; font-weight:bold; cursor:pointer">RESET</div>
    </div>

    <button class="btnCamera" onclick="abrirScanner()">📷 LER CÓDIGO DE BARRAS</button>
    
    <div id="listaNotas">
        <small style="color:#7f8c8d;">Notas na fila:</small>
        <div id="notasContiner"></div>
        <button onclick="notaManual()" style="padding:5px; font-size:12px; background:#f1f2f6; color:#555; margin-top:8px;">+ Digitar Nota Manual</button>
    </div>

    <input id="recebedor" placeholder="Nome de quem recebeu">
    <input id="rgcpf" placeholder="Documento (RG/CPF)">
    
    <p style="margin: 20px 0 5px 0; font-size: 14px;"><b>Assine abaixo:</b></p>
    <canvas id="assinatura"></canvas>
    <button class="btnLimpar" onclick="limparAss()">Limpar Assinatura</button>

    <input id="ordem" placeholder="Ordem de Serviço (Opcional)">
    <input id="expedidor" placeholder="Nome do Expedidor">

    <button class="btnSalvar" id="btnSalvar" onclick="salvar()">FINALIZAR E ENVIAR</button>
</div>

<div id="scannerTela">
    <div id="reader"></div>
    <div class="controles-scanner">
        <button class="btn-circular" onclick="fecharScanner()">FECHAR</button>
        <button class="btn-circular" onclick="alternarCamera()">VIRAR</button>
    </div>
</div>

<script>
let scanner;
let notas = [];
let currentCameraId = "environment";
const apiUrl = "https://script.google.com/macros/s/AKfycbxOseaVN67HO0UMyGpHoWqCX1llA0uazVeI4xvUha7TYF7UNL-Jnwc-LIWBfmmzce9LlA/exec";

function extrairNumeroNF(codigo) {
    let numeros = codigo.replace(/\D/g, '');
    return numeros.length >= 34 ? numeros.substring(25, 34) : numeros;
}

function abrirScanner() {
    document.getElementById("scannerTela").style.display = "block";
    
    if (scanner) { scanner.clear(); }
    
    scanner = new Html5Qrcode("reader");
    
    const config = {
        fps: 60, // Aumentado para leitura instantânea
        qrbox: { width: 320, height: 150 }, // Formato ideal para DANFE
        aspectRatio: 1.777778 // 16:9 para mobile
    };

    scanner.start(
        { facingMode: currentCameraId },
        config,
        (codigo) => {
            let nota = extrairNumeroNF(codigo);
            if (!notas.includes(nota)) {
                notas.push(nota);
                document.getElementById("notasContiner").innerHTML = notas.map(n => `<span class="nota-item">${n}</span>`).join('');
                navigator.vibrate(150);
                fecharScanner();
            }
        }
    ).catch(err => console.error("Erro ao iniciar câmera", err));
}

function alternarCamera() {
    currentCameraId = (currentCameraId === "environment") ? "user" : "environment";
    fecharScanner();
    abrirScanner();
}

function fecharScanner() {
    if (scanner) {
        scanner.stop().then(() => {
            document.getElementById("scannerTela").style.display = "none";
        }).catch(() => document.getElementById("scannerTela").style.display = "none");
    }
}

function notaManual() {
    let n = prompt("Número da Nota:");
    if (n) {
        notas.push(n);
        document.getElementById("notasContiner").innerHTML = notas.map(n => `<span class="nota-item">${n}</span>`).join('');
    }
}

// LÓGICA DA ASSINATURA (Canvas)
const canvas = document.getElementById("assinatura");
const ctx = canvas.getContext("2d");
canvas.width = canvas.offsetWidth;
canvas.height = 180;

let drawing = false;
canvas.addEventListener("pointerdown", (e) => {
    drawing = true;
    ctx.beginPath();
    const r = canvas.getBoundingClientRect();
    ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
});

canvas.addEventListener("pointermove", (e) => {
    if (!drawing) return;
    const r = canvas.getBoundingClientRect();
    ctx.lineWidth = 3;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#000";
    ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
    ctx.stroke();
});

canvas.addEventListener("pointerup", () => drawing = false);

function limparAss() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

function salvar() {
    const recebedor = document.getElementById("recebedor").value;
    const rgcpf = document.getElementById("rgcpf").value;
    
    if (!recebedor || !rgcpf || notas.length === 0) {
        alert("Preencha Notas, Recebedor e Documento!");
        return;
    }

    const btn = document.getElementById("btnSalvar");
    btn.disabled = true;
    btn.innerText = "ENVIANDO AGUARDE...";

    // Captura a assinatura como Base64
    const assinaturaData = canvas.toDataURL("image/png");

    fetch(apiUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            notas: notas,
            recebedor: recebedor,
            documento: rgcpf,
            ordem: document.getElementById("ordem").value,
            expedidor: document.getElementById("expedidor").value,
            assinatura: assinaturaData
        })
    }).then(() => {
        alert("Sucesso! Os canhotos foram enviados.");
        location.reload();
    }).catch(err => {
        alert("Erro na conexão.");
        btn.disabled = false;
        btn.innerText = "FINALIZAR E ENVIAR";
    });
}
</script>
</body>
</html>
