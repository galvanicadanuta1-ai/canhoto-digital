<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:20px;
}

#reader{
width:100%;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

.scan{background:#2563eb;color:white}
.salvar{background:#22c55e;color:white}
.limpar{background:#ef4444;color:white}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:6px;
border:none;
}

canvas{
width:100%;
height:200px;
background:white;
margin-top:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>Canhoto Digital</h2>

<button class="scan" onclick="iniciarScanner()">Escanear Notas</button>

<div id="reader"></div>

<h3>Notas escaneadas</h3>

<div id="lista"></div>

<input id="empresa" placeholder="Empresa">
<input id="cnpj" placeholder="CNPJ">

<input id="recebedor" placeholder="Nome Recebedor">
<input id="documento" placeholder="CPF ou RG">

<input id="expedidor" placeholder="Nome Expedidor">

<h3>Assinatura</h3>

<canvas id="assinatura"></canvas>

<button class="limpar" onclick="limparAss()">Limpar assinatura</button>

<button class="salvar" onclick="salvar()">Salvar</button>

<script>

let notas=[]

let beep=new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg")

function iniciarScanner(){

const scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:{width:250,height:120}},

codigo=>{

beep.play()

if(codigo.length>=44){

let numero=codigo.substring(25,34)

if(!notas.includes(numero)){

notas.push(numero)

document.getElementById("lista").innerHTML=notas.join("<br>")

navigator.vibrate(200)

}

}

}

)

}

let canvas=document.getElementById("assinatura")
let ctx=canvas.getContext("2d")

let desenhando=false

canvas.addEventListener("pointerdown",e=>{
desenhando=true
ctx.beginPath()
ctx.moveTo(e.offsetX,e.offsetY)
})

canvas.addEventListener("pointermove",e=>{
if(!desenhando)return
ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()
})

canvas.addEventListener("pointerup",()=>desenhando=false)

function limparAss(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}

function salvar(){

alert("Aqui depois conectaremos com sua planilha")

}

</script>

</body>

</html>
