<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial; margin: 0; background: #f2f2f2; }
        .container { max-width: 520px; margin: auto; padding: 15px; }
        .topo { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #0f4c81; }
        .logo-topo { height: 40px; width: auto; }
        .titulo { font-size: 16px; font-weight: bold; color: #333; }
        .limparTudo { font-size: 24px; color: red; cursor: pointer; padding: 0 10px; }
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btnCamera { background: #0f4c81; color: white; }
        .btnSalvar { background: #28a745; color: white; margin-top: 20px; }
        .btnLimpar { background: #dc3545; color: white; font-size: 14px; padding: 8px; width: auto; display: block; margin: 5px 0 15px 0; }
        #listaNotas { background: #fff; padding: 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; }
        .nota-item { background: #e2eaf1; color: #0f4c81; padding: 5px 12px; margin: 4px; border-radius: 20px; display: inline-block; font-size: 14px; border: 1px solid #0f4c81; }
        input { width: 100%; padding: 14px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        canvas { border: 2px dashed #999; width: 100%; height: 160px; background: white; touch-action: none; border-radius: 8px; }
        #scannerTela { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; display: none; z-index: 9999; }
        #reader { width: 100%; height: 100%; }
        .scanline { position: absolute; top: 50%; width: 100%; height: 2px; background: red; box-shadow: 0 0 8px red; }
        .btnFechar { position: absolute; top: 20px; right: 20px; background: rgba(255,0,0,0.7); color: white; padding: 10px 20px; font-size: 16px; border-radius: 5px; z-index: 10000; }
    </style>
</head>
<body>

<div class="container">
    <div class="topo">
        <img src="logo.png" alt="Logo" class="logo-topo" onerror="this.style.display='none'">
        <div class="titulo">CANHOTO DIGITAL DANUTA</div>
        <div class="limparTudo" onclick="limparTudo()">×</div>
    </div>

    <button class="btnCamera" onclick="abrirScanner()">📷 ABRIR SCANNER</button>
    <button class="btnCamera" style="background:#6c757d; font-size: 15px;" onclick="notaManual()">+ Adicionar Nota Manual</button>

    <div id="listaNotas">
        <small style="color:#666; font-weight: bold;">Notas selecionadas:</small>
        <div id="notasContiner" style="margin-top:8px;"></div>
    </div>

    <input id="recebedor" placeholder="Nome do Recebedor">
    <input id="rgcpf" placeholder="RG ou CPF">
    
    <p style="margin: 15px 0 5px 0;"><b>Assinatura Digital:</b></p>
    <canvas id="assinatura"></canvas>
    <button class="btnLimpar" onclick="limparAss()">Limpar Assinatura</button>

    <input id="ordem" placeholder="Ordem de Serviço">
    <input id="expedidor" placeholder="Nome do Expedidor">

    <button class="btnSalvar" id="btnSalvar" onclick="salvar()">GRAVAR E ENVIAR</button>
</div>

<div id="scannerTela">
    <div class="btnFechar" onclick="fecharScanner()">FECHAR</div>
    <div id="reader"></div>
    <div class="scanline"></div>
</div>

<script>
let scanner;
let notas = [];
const apiUrl = "https://script.google.com/macros/s/AKfycbxOseaVN67HO0UMyGpHoWqCX1llA0uazVeI4xvUha7TYF7UNL-Jnwc-LIWBfmmzce9LlA/exec";

function extrairNumeroNF(codigo) {
    let numeros = codigo.replace(/\D/g, '');
    if (numeros.length >= 34) {
        return numeros.substring(25, 34); // Posição exata do número da nota na chave de 44 dígitos
    }
    return numeros;
}

function atualizarLista() {
    const container = document.getElementById("notasContiner");
    if(notas.length === 0) {
        container.innerHTML = "<span style='color:gray; font-size:12px;'>Nenhuma nota lida</span>";
        return;
    }
    container.innerHTML = notas.map(n => `<span class="nota-item">${n}</span>`).join('');
}

function abrirScanner() {
    document.getElementById("scannerTela").style.display = "block";
    scanner = new Html5Qrcode("reader");
    scanner.start(
        { facingMode: "environment" },
        { fps: 25, qrbox: { width: 300, height: 150 } },
        (codigo) => {
            let nota = extrairNumeroNF(codigo);
            if (!notas.includes(nota)) {
                notas.push(nota);
                atualizarLista();
                navigator.vibrate(100);
                let beep = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
                beep.play();
                fecharScanner(); // FECHA SOZINHO APÓS LER
            }
        }
    ).catch(err => console.error(err));
}

function fecharScanner() {
    if (scanner) {
        scanner.stop().then(() => {
            document.getElementById("scannerTela").style.display = "none";
        }).catch(() => {
            document.getElementById("scannerTela").style.display = "none";
        });
    } else {
        document.getElementById("scannerTela").style.display = "none";
    }
}

function notaManual() {
    let nota = prompt("Digite o número da nota:");
    if (nota) {
        nota = nota.trim();
        if(!notas.includes(nota)) {
            notas.push(nota);
            atualizarLista();
        }
    }
}

function limparTudo() {
    if(confirm("Deseja limpar todos os campos e notas?")) {
        location.reload();
    }
}

// LÓGICA DA ASSINATURA
let canvas = document.getElementById("assinatura");
let ctx = canvas.getContext("2d");
function redimensionarCanvas() {
    canvas.width = canvas.offsetWidth;
}
window.addEventListener("resize", redimensionarCanvas);
redimensionarCanvas();

let desenhando = false;
canvas.addEventListener("pointerdown", (e) => {
    desenhando = true;
    ctx.beginPath();
    let r = canvas.getBoundingClientRect();
    ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
});

canvas.addEventListener("pointermove", (e) => {
    if (!desenhando) return;
    let r = canvas.getBoundingClientRect();
    ctx.lineWidth = 2;
    ctx.lineCap = "round";
    ctx.strokeStyle = "#000";
    ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
    ctx.stroke();
});

canvas.addEventListener("pointerup", () => desenhando = false);

function limparAss() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function salvar() {
    let recebedor = document.getElementById("recebedor").value;
    let rgcpf = document.getElementById("rgcpf").value;
    let ordem = document.getElementById("ordem").value;
    let expedidor = document.getElementById("expedidor").value;

    if (!recebedor || !rgcpf || notas.length === 0) {
        alert("Campos Obrigatórios: Notas, Recebedor e RG/CPF");
        return;
    }

    let assinatura = canvas.toDataURL();
    const btn = document.getElementById("btnSalvar");
    btn.disabled = true;
    btn.innerText = "ENVIANDO... AGUARDE";
    btn.style.background = "#666";

    fetch(apiUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            notas: notas,
            recebedor: recebedor,
            documento: rgcpf,
            ordem: ordem,
            expedidor: expedidor,
            assinatura: assinatura
        })
    }).then(() => {
        alert("Canhoto(s) processado(s) com sucesso!");
        location.reload();
    }).catch(err => {
        alert("Erro ao enviar dados.");
        btn.disabled = false;
        btn.innerText = "GRAVAR E ENVIAR";
        btn.style.background = "#28a745";
    });
}

// Inicializa lista vazia
atualizarLista();
</script>
</body>
</html>
