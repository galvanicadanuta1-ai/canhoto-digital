<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Arial; margin: 0; background: #f0f2f5; color: #333; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .topo { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .logo-topo { height: 35px; }
        .titulo { font-size: 16px; font-weight: bold; color: #0f4c81; }
        
        #scannerTela { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 9999; }
        #reader { width: 100% !important; height: 100% !important; }
        
        button { width: 100%; padding: 16px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btnCamera { background: #0f4c81; color: white; }
        .btnSalvar { background: #2ecc71; color: white; margin-top: 25px; }
        .btnManual { padding: 12px; font-size: 14px; background: #444; color: #fff; margin-top: 8px; font-weight: bold; }
        
        #listaNotas { background: #fff; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; min-height: 50px; }
        .nota-item { background: #0f4c81; color: #fff; padding: 6px 12px; margin: 4px; border-radius: 6px; display: inline-block; font-size: 13px; font-weight: bold; }
        
        input { width: 100%; padding: 16px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; background: #fff; }
        canvas { border: 2px solid #bdc3c7; width: 100%; height: 180px; background: white; touch-action: none; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="topo">
        <img src="https://raw.githubusercontent.com/galvanicadanuta1-ai/canhoto-digital/main/logo.png" class="logo-topo">
        <div class="titulo">CANHOTO DIGITAL</div>
        <div onclick="location.reload()" style="color:red; font-size:12px; font-weight:bold; cursor:pointer">RESET</div>
    </div>

    <button class="btnCamera" onclick="abrirScanner()">📷 ABRIR SCANNER</button>
    
    <div id="listaNotas">
        <div id="notasContiner"></div>
        <button class="btnManual" onclick="notaManual()">+ Adicionar N° Nota Manualmente</button>
    </div>

    <input id="recebedor" type="text" placeholder="Nome Completo de quem recebeu" oninput="this.value=this.value.replace(/[0-9]/g,'')">
    <input id="rgcpf" type="tel" inputmode="numeric" placeholder="Documento (RG ou CPF)" oninput="this.value=this.value.replace(/\D/g,'')">
    
    <canvas id="assinatura"></canvas>
    <button style="background:none; color:red; text-decoration:underline; font-size:12px; width:auto; padding:5px; margin:0;" onclick="limparAss()">Limpar Assinatura</button>

    <input id="ordem" type="tel" inputmode="numeric" placeholder="Ordem de Serviço Danuta" oninput="this.value=this.value.replace(/\D/g,'')">
    <input id="expedidor" type="text" placeholder="Nome do Expedidor" oninput="this.value=this.value.replace(/[0-9]/g,'')">

    <button class="btnSalvar" id="btnSalvar" onclick="salvar()">SALVAR</button>
</div>

<div id="scannerTela">
    <div id="reader"></div>
    <div style="position:absolute; bottom:30px; width:100%; text-align:center;">
        <button onclick="fecharScanner()" style="width:80%; background:red; color:white;">FECHAR</button>
    </div>
</div>

<script>
let scanner;
let notas = [];
const apiUrl = "https://script.google.com/macros/s/AKfycbxOseaVN67HO0UMyGpHoWqCX1llA0uazVeI4xvUha7TYF7UNL-Jnwc-LIWBfmmzce9LlA/exec";

function extrairNumeroNF(codigo) {
    let numeros = codigo.replace(/\D/g, '');
    return numeros.length >= 34 ? numeros.substring(25, 34) : numeros;
}

function abrirScanner() {
    document.getElementById("scannerTela").style.display = "block";
    scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 60, qrbox: { width: 300, height: 150 } }, (codigo) => {
        let nota = extrairNumeroNF(codigo);
        if (!notas.includes(nota)) {
            notas.push(nota);
            atualizarVisualNotas();
            fecharScanner();
            navigator.vibrate(100);
        }
    }).catch(err => alert("Erro ao abrir câmera."));
}

function fecharScanner() {
    if (scanner) { scanner.stop().then(() => { document.getElementById("scannerTela").style.display = "none"; }); }
}

function notaManual() {
    let n = prompt("Digite o N° da Nota Fiscal:");
    if (n) {
        let limpo = n.replace(/\D/g, '');
        if (limpo && !notas.includes(limpo)) {
            notas.push(limpo);
            atualizarVisualNotas();
        }
    }
}

function atualizarVisualNotas() {
    document.getElementById("notasContiner").innerHTML = notas.map(n => `<span class="nota-item">${n}</span>`).join('');
}

const canvas = document.getElementById("assinatura");
const ctx = canvas.getContext("2d");
canvas.width = canvas.offsetWidth;
canvas.height = 180;
let drawing = false;

canvas.addEventListener("pointerdown", (e) => { drawing = true; ctx.beginPath(); const r = canvas.getBoundingClientRect(); ctx.moveTo(e.clientX - r.left, e.clientY - r.top); });
canvas.addEventListener("pointermove", (e) => { if (!drawing) return; const r = canvas.getBoundingClientRect(); ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle="#000"; ctx.lineTo(e.clientX - r.left, e.clientY - r.top); ctx.stroke(); });
canvas.addEventListener("pointerup", () => drawing = false);
function limparAss() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

function salvar() {
    const d = {
        recebedor: document.getElementById("recebedor").value.trim(),
        doc: document.getElementById("rgcpf").value.trim(),
        ordem: document.getElementById("ordem").value.trim(),
        exp: document.getElementById("expedidor").value.trim()
    };

    if (!d.recebedor || !d.doc || !d.ordem || !d.exp || notas.length === 0) {
        alert("Preencha todos os campos corretamente.");
        return;
    }

    const btn = document.getElementById("btnSalvar");
    btn.disabled = true;
    btn.innerText = "ENVIANDO...";

    fetch(apiUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            notas: notas,
            recebedor: d.recebedor,
            documento: d.doc,
            ordem: d.ordem,
            expedidor: d.exp,
            assinatura: canvas.toDataURL("image/png")
        })
    }).then(() => {
        alert("Sucesso!");
        location.reload();
    }).catch(() => {
        alert("Erro.");
        btn.disabled = false;
        btn.innerText = "SALVAR";
    });
}
</script>
</body>
</html>
