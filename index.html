<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
background:#f1f5f9;
margin:0;
padding:10px;
}

h2{
text-align:center;
}

#reader{
width:100%;
}

input{
width:100%;
padding:16px;
font-size:18px;
margin-top:8px;
}

button{
width:100%;
padding:16px;
font-size:18px;
margin-top:10px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
}

canvas{
border:2px solid black;
width:100%;
height:150px;
margin-top:10px;
}

#notas{
font-size:20px;
background:white;
padding:10px;
margin-top:10px;
}

.mira{
border:3px solid #00ff00;
position:absolute;
width:250px;
height:250px;
top:30%;
left:50%;
transform:translate(-50%,-50%);
pointer-events:none;
}

</style>

</head>

<body>

<h2>Canhoto Digital</h2>

<div style="position:relative">
<div id="reader"></div>
<div class="mira"></div>
</div>

<div id="notas">Notas:</div>

<input id="empresa" placeholder="Empresa">

<input id="cnpj" placeholder="CNPJ">

<input id="recebedor" placeholder="Recebedor">

<input id="documento" placeholder="CPF ou RG">

<input id="expedidor" placeholder="Expedidor">

<canvas id="assinatura"></canvas>

<button onclick="limpar()">Limpar Assinatura</button>

<button onclick="salvar()">Salvar</button>

<script>

var notas=[]

function extrairNota(codigo){

return codigo.slice(-9)

}

function extrairCNPJ(codigo){

return codigo.substring(6,20)

}

function onScanSuccess(decodedText){

var nota = extrairNota(decodedText)

var cnpj = extrairCNPJ(decodedText)

if(!notas.includes(nota)){

notas.push(nota)

document.getElementById("notas").innerHTML="Notas: "+notas.join(", ")

document.getElementById("cnpj").value = cnpj

navigator.vibrate(200)

var audio = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg")

audio.play()

}

}

var scanner = new Html5QrcodeScanner("reader",{fps:10,qrbox:250})

scanner.render(onScanSuccess)

var canvas=document.getElementById("assinatura")
var ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-20
canvas.height=150

var desenhando=false

canvas.addEventListener("pointerdown",e=>{
desenhando=true
ctx.beginPath()
})

canvas.addEventListener("pointermove",e=>{

if(!desenhando) return

var rect=canvas.getBoundingClientRect()

var x=e.clientX-rect.left
var y=e.clientY-rect.top

ctx.lineWidth=2
ctx.lineTo(x,y)
ctx.stroke()

})

canvas.addEventListener("pointerup",()=>desenhando=false)

function limpar(){
ctx.clearRect(0,0,canvas.width,canvas.height)
}

function salvar(){

var assinatura=canvas.toDataURL()

fetch("COLE_AQUI_SEU_LINK_DO_APPS_SCRIPT",{

method:"POST",

body:JSON.stringify({

notas:notas,
empresa:document.getElementById("empresa").value,
cnpj:document.getElementById("cnpj").value,
recebedor:document.getElementById("recebedor").value,
documento:document.getElementById("documento").value,
expedidor:document.getElementById("expedidor").value,
assinatura:assinatura

})

})

alert("Dados enviados para planilha")

}

</script>

</body>
</html>
