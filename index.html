<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Canhoto Digital Danuta</title>

<style>
body {
  font-family: Arial;
  margin: 10px;
}

h2 {
  text-align: center;
  font-weight: bold;
}

.topo {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.limparTudo {
  background: red;
  color: white;
  border: none;
  padding: 8px;
  font-size: 16px;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 5px;
  font-size: 16px;
}

video {
  width: 100%;
  margin-top: 10px;
}

canvas {
  border: 1px solid black;
  width: 100%;
  height: 150px;
}

#listaNotas {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="topo">
  <div></div>
  <button class="limparTudo" onclick="limparTudo()">X</button>
</div>

<h2>Canhoto Digital Danuta</h2>

<button onclick="abrirCamera()">📷 Abrir Câmera</button>
<button onclick="adicionarManual()">➕ Adicionar Nota Manual</button>

<video id="video" autoplay></video>
<button onclick="fecharCamera()">❌ Fechar Câmera</button>

<div id="listaNotas"></div>

<input type="text" id="recebedor" placeholder="Recebedor">
<input type="text" id="documento" placeholder="RG / CPF">

<canvas id="assinatura"></canvas>
<button onclick="limparAssinatura()" style="background:red;color:white;">Limpar Assinatura</button>

<input type="text" id="ordem" placeholder="Ordem de Serviço">
<input type="text" id="expedidor" placeholder="Expedidor">

<button onclick="salvar()" style="background:green;color:white;">Salvar</button>

<script>

let notas = [];
let stream;
let canvas = document.getElementById("assinatura");
let ctx = canvas.getContext("2d");
let desenhando = false;

canvas.addEventListener("mousedown", () => desenhando = true);
canvas.addEventListener("mouseup", () => desenhando = false);
canvas.addEventListener("mousemove", desenhar);

function desenhar(e) {
  if (!desenhando) return;
  ctx.lineWidth = 2;
  ctx.lineTo(e.offsetX, e.offsetY);
  ctx.stroke();
}

function limparAssinatura() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function limparTudo() {
  notas = [];
  document.getElementById("listaNotas").innerHTML = "";
  document.getElementById("recebedor").value = "";
  document.getElementById("documento").value = "";
  document.getElementById("ordem").value = "";
  document.getElementById("expedidor").value = "";
  limparAssinatura();
}

function abrirCamera() {
  navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
    .then(s => {
      stream = s;
      document.getElementById("video").srcObject = stream;
    });
}

function fecharCamera() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }
}

function adicionarManual() {
  let nota = prompt("Digite o número da nota:");
  if (nota) {
    notas.push(nota);
    atualizarLista();
  }
}

function atualizarLista() {
  document.getElementById("listaNotas").innerHTML = notas.join(", ");
}

function salvar() {

  let recebedor = document.getElementById("recebedor").value;
  let documento = document.getElementById("documento").value;
  let ordem = document.getElementById("ordem").value;
  let expedidor = document.getElementById("expedidor").value;

  if (!recebedor || !documento || !ordem || !expedidor || notas.length == 0) {
    alert("Preencha todos os campos!");
    return;
  }

  let assinatura = canvas.toDataURL();

  fetch("https://script.google.com/macros/s/AKfycbxOseaVN67HO0UMyGpHoWqCX1llA0uazVeI4xvUha7TYF7UNL-Jnwc-LIWBfmmzce9LlA/exec", {
    method: "POST",
    body: JSON.stringify({
      notas,
      recebedor,
      documento,
      ordem,
      expedidor,
      assinatura
    })
  })
  .then(() => {
    alert("Salvo com sucesso!");
    limparTudo();
  });

}

</script>

</body>
</html>
