<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Arial; margin: 0; background: #f0f2f5; padding-bottom: 50px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .topo { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .logo-topo { height: 35px; }
        
        #scannerTela { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 9999; }
        #reader { width: 100% !important; height: 100% !important; }
        
        button { width: 100%; padding: 18px; margin-top: 10px; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btnScan { background: #0f4c81; color: white; }
        .btnScan:active { background: #0a355a; }
        .btnSalvar { background: #2ecc71; color: white; margin-top: 35px; font-size: 18px; }
        .btnManual { padding: 10px 15px; font-size: 13px; background: #555; color: #fff; margin-top: 5px; width: auto; border-radius: 6px; display: inline-block; }
        
        .box-leitura { background: #fff; padding: 10px; margin-top: 8px; border-radius: 8px; border: 1px solid #ddd; min-height: 45px; display: flex; flex-wrap: wrap; gap: 5px; }
        .tag { background: #0f4c81; color: #fff; padding: 6px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        
        input { width: 100%; padding: 16px; margin-top: 15px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #0f4c81; }
        canvas { border: 2px solid #bdc3c7; width: 100%; height: 200px; background: white; touch-action: none; border-radius: 10px; margin-top: 15px; }
        .label-fixo { font-size: 13px; font-weight: bold; color: #444; margin-top: 20px; display: block; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <div class="topo">
        <img src="https://raw.githubusercontent.com/galvanicadanuta1-ai/canhoto-digital/main/logo.png" class="logo-topo">
        <div onclick="location.reload()" style="color:red; font-size:12px; font-weight:bold; cursor:pointer; padding: 5px; border: 1px solid red; border-radius: 5px;">RESET</div>
    </div>

    <button class="btnScan" onclick="abrirScanner('NF')">📷 ESCANEAR NOTA FISCAL</button>
    <div class="box-leitura" id="contNF"></div>
    <button class="btnManual" onclick="addManual('NF')">+ Digitar Nota</button>

    <input id="recebedor" type="text" placeholder="Nome Completo de quem recebeu" oninput="this.value=this.value.replace(/[0-9]/g,'')">
    <input id="rgcpf" type="tel" inputmode="numeric" placeholder="Documento (RG ou CPF)" oninput="this.value=this.value.replace(/\D/g,'')">
    
    <span class="label-fixo">Assinatura do Recebedor:</span>
    <canvas id="assinatura"></canvas>
    <button style="background:none; color:red; text-decoration:underline; font-size:12px; width:auto; padding:5px; margin-top:5px;" onclick="limparAss()">Limpar Assinatura</button>

    <button class="btnScan" style="margin-top:25px;" onclick="abrirScanner('OS')">📷 ESCANEAR OS</button>
    <div class="box-leitura" id="contOS"></div>
    <button class="btnManual" onclick="addManual('OS')">+ Digitar OS</button>

    <input id="expedidor" type="text" placeholder="Nome do Expedidor" oninput="this.value=this.value.replace(/[0-9]/g,'')">

    <button class="btnSalvar" id="btnSalvar" onclick="salvar()">SALVAR CANHOTO</button>
</div>

<div id="scannerTela">
    <div id="reader"></div>
    <div style="position:absolute; bottom:40px; width:100%; text-align:center;">
        <button onclick="fecharScanner()" style="width:70%; background:red; color:white; padding:15px;">CANCELAR</button>
    </div>
</div>

<script>
let scanner;
let listaNF = [];
let listaOS = [];
let destino = 'NF';
// COLE AQUI A URL DA NOVA IMPLANTAÇÃO (DEPLOY)
const apiUrl = "COLE_AQUI_A_URL_DO_GOOGLE"; 

function extrairNum(codigo) {
    let n = codigo.replace(/\D/g, '');
    return n.length >= 34 ? n.substring(25, 34) : n;
}

function abrirScanner(tipo) {
    destino = tipo;
    document.getElementById("scannerTela").style.display = "block";
    scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 60, qrbox: { width: 280, height: 150 } }, (codigo) => {
        let num = extrairNum(codigo);
        adicionarValor(num);
        fecharScanner();
        navigator.vibrate(100);
    }).catch(err => alert("Erro ao abrir câmera. Verifique permissões."));
}

function fecharScanner() {
    if (scanner) { scanner.stop().then(() => { document.getElementById("scannerTela").style.display = "none"; }); }
}

function addManual(tipo) {
    destino = tipo;
    let n = prompt(tipo === 'NF' ? "N° da Nota Fiscal:" : "N° da Ordem de Serviço:");
    if (n) { adicionarValor(n.replace(/\D/g, '')); }
}

function adicionarValor(val) {
    if (!val) return;
    if (destino === 'NF') {
        if (!listaNF.includes(val)) listaNF.push(val);
        renderTags('contNF', listaNF);
    } else {
        if (!listaOS.includes(val)) listaOS.push(val);
        renderTags('contOS', listaOS);
    }
}

function renderTags(id, lista) {
    document.getElementById(id).innerHTML = lista.map(item => `<span class="tag">${item}</span>`).join('');
}

const canvas = document.getElementById("assinatura");
const ctx = canvas.getContext("2d");
canvas.width = canvas.offsetWidth; canvas.height = 200;
let drawing = false;

// Suporte para Touch e Mouse
const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - r.left, y: clientY - r.top };
};

canvas.addEventListener("pointerdown", (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); });
canvas.addEventListener("pointermove", (e) => { if (!drawing) return; const p = getPos(e); ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.strokeStyle = "#000"; ctx.lineTo(p.x, p.y); ctx.stroke(); });
canvas.addEventListener("pointerup", () => drawing = false);

function limparAss() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

function salvar() {
    const d = {
        recebedor: document.getElementById("recebedor").value.trim(),
        doc: document.getElementById("rgcpf").value.trim(),
        exp: document.getElementById("expedidor").value.trim()
    };

    if (!d.recebedor || !d.doc || !d.exp || listaNF.length === 0 || listaOS.length === 0) {
        alert("Erro: Preencha todos os campos e escaneie ao menos 1 NF e 1 OS.");
        return;
    }

    const btn = document.getElementById("btnSalvar");
    btn.disabled = true; btn.innerText = "ENVIANDO AGUARDE...";

    fetch(apiUrl, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            notas: listaNF,
            ordens: listaOS,
            recebedor: d.recebedor,
            documento: d.doc,
            expedidor: d.exp,
            assinatura: canvas.toDataURL("image/png")
        })
    }).then(() => {
        alert("Canhoto enviado com sucesso!");
        location.reload();
    }).catch(() => {
        alert("Erro de conexão. Tente novamente.");
        btn.disabled = false;
        btn.innerText = "SALVAR CANHOTO";
    });
}
</script>
</body>
</html>
